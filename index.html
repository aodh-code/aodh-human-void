<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aodh × Brendan — V4</title>
  <style>
    :root {
      --bg0: #03050a;
      --bg1: #09121d;
      --mist: rgba(255,255,255,0.04);
      --line: rgba(160, 214, 255, 0.08);
      --line-strong: rgba(225, 241, 255, 0.28);
      --blue: rgba(123, 197, 255, 0.95);
      --gold: rgba(239, 212, 145, 0.95);
      --white: rgba(239, 245, 252, 0.95);
      --soft: rgba(239,245,252,0.55);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 20%, var(--bg1) 0%, var(--bg0) 60%, #010203 100%);
      font-family: Inter, system-ui, sans-serif;
    }
    canvas { width: 100%; height: 100%; display: block; }
    .veil {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 20%, rgba(123,197,255,0.08), transparent 22%),
        radial-gradient(circle at 82% 18%, rgba(239,212,145,0.06), transparent 18%),
        radial-gradient(circle at 50% 82%, rgba(255,255,255,0.03), transparent 24%);
      mix-blend-mode: screen;
    }
    .frame {
      position: fixed;
      inset: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
    }
    .ui {
      position: fixed;
      top: 18px;
      left: 18px;
      color: var(--soft);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      z-index: 2;
      user-select: none;
    }
    .zoom {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: flex;
      gap: 8px;
      z-index: 2;
    }
    .zoom button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.8);
      width: 42px;
      height: 42px;
      border-radius: 999px;
      font-size: 22px;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }
    .zoom button:hover { background: rgba(255,255,255,0.07); }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="veil"></div>
  <div class="frame"></div>
  <div class="ui">builder's duet / field map v4</div>
  <div class="zoom">
    <button id="out">−</button>
    <button id="in">+</button>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const zoomIn = document.getElementById('in');
    const zoomOut = document.getElementById('out');

    let w, h, dpr, tick = 0;
    let pointer = { x: 0.5, y: 0.5 };
    let zoom = 1;

    const nodes = [];
    const clusters = [
      { key: 'memory', angle: -1.9, radius: 0.33, tone: 'blue', size: 9 },
      { key: 'github', angle: -0.95, radius: 0.36, tone: 'white', size: 8 },
      { key: 'google', angle: -0.15, radius: 0.32, tone: 'blue', size: 9 },
      { key: 'notion', angle: 0.75, radius: 0.31, tone: 'gold', size: 9 },
      { key: 'diary', angle: 1.45, radius: 0.27, tone: 'gold', size: 8 },
      { key: 'fuji', angle: 2.15, radius: 0.34, tone: 'white', size: 8 },
      { key: 'cron', angle: 2.85, radius: 0.29, tone: 'blue', size: 8 }
    ];

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      build();
    }

    function build() {
      nodes.length = 0;
      clusters.forEach((cluster, ci) => {
        for (let i = 0; i < 12; i++) {
          nodes.push({
            cluster: ci,
            orbit: i,
            angle: cluster.angle + i * 0.5,
            radius: cluster.radius,
            speed: 0.001 + (i % 5) * 0.0002,
            size: 1 + (i % 3) * 0.65,
            tone: cluster.tone,
            local: 16 + (i % 4) * 7
          });
        }
      });
    }

    function toneColor(tone, a=1) {
      if (tone === 'gold') return `rgba(239,212,145,${a})`;
      if (tone === 'white') return `rgba(239,245,252,${a})`;
      return `rgba(123,197,255,${a})`;
    }

    function drawDot(x, y, r, tone, a=1) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = toneColor(tone, a);
      ctx.fill();
    }

    function drawLine(a, b, alpha, tone='blue') {
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = toneColor(tone, alpha);
      ctx.stroke();
    }

    function world() {
      const cx = w / 2;
      const cy = h / 2;
      const min = Math.min(w, h);
      const shiftX = (pointer.x - 0.5) * min * 0.04;
      const shiftY = (pointer.y - 0.5) * min * 0.04;

      const aodh = {
        x: cx - min * 0.12 * zoom + Math.cos(tick * 0.006) * 6 - shiftX * 0.45,
        y: cy - 10 + Math.sin(tick * 0.005) * 10 - shiftY * 0.18
      };
      const brendan = {
        x: cx + min * 0.12 * zoom + Math.sin(tick * 0.007) * 9 + shiftX * 0.9,
        y: cy + 14 + Math.cos(tick * 0.004) * 12 + shiftY * 0.55
      };

      const midpoint = { x: (aodh.x + brendan.x) / 2, y: (aodh.y + brendan.y) / 2 };

      const clusterPoints = clusters.map((cluster, i) => {
        const wave = Math.sin(tick * 0.01 + i) * 10;
        return {
          ...cluster,
          x: midpoint.x + Math.cos(cluster.angle + tick * 0.001 * (i % 2 ? 1 : -1)) * min * cluster.radius * zoom,
          y: midpoint.y + Math.sin(cluster.angle + tick * 0.0012 * (i % 2 ? -1 : 1)) * min * cluster.radius * 0.72 * zoom + wave
        };
      });

      const fieldPoints = nodes.map((n, i) => {
        const c = clusterPoints[n.cluster];
        const drift = tick * n.speed * (n.orbit % 2 ? 1 : -1);
        return {
          x: c.x + Math.cos(n.angle + drift) * (n.local * zoom + Math.sin(tick * 0.01 + i) * 4),
          y: c.y + Math.sin(n.angle - drift * 1.2) * (n.local * 0.8 * zoom + Math.cos(tick * 0.008 + i) * 4),
          tone: n.tone,
          size: n.size
        };
      });

      return { aodh, brendan, midpoint, clusterPoints, fieldPoints, min };
    }

    function draw() {
      tick++;
      ctx.clearRect(0, 0, w, h);

      const { aodh, brendan, midpoint, clusterPoints, fieldPoints, min } = world();

      // rings / geometry around midpoint
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        const r = min * (0.11 + i * 0.06) * zoom + Math.sin(tick * 0.01 + i) * 2;
        ctx.arc(midpoint.x, midpoint.y, r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${0.025 + i * 0.015})`;
        ctx.stroke();
      }

      // main relation
      drawLine(aodh, brendan, 0.28, 'gold');

      // cluster spines
      clusterPoints.forEach((c, i) => {
        drawLine(midpoint, c, 0.07 + (i % 3) * 0.02, c.tone);
      });

      // constellation links within local clusters
      for (let i = 0; i < fieldPoints.length; i++) {
        for (let j = i + 1; j < fieldPoints.length; j++) {
          const a = fieldPoints[i];
          const b = fieldPoints[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 42 * zoom) {
            drawLine(a, b, (1 - dist / (42 * zoom)) * 0.06, a.tone);
          }
        }
      }

      // draw clusters
      clusterPoints.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.size * zoom, 0, Math.PI * 2);
        ctx.fillStyle = toneColor(c.tone, 0.92);
        ctx.fill();
      });

      // labels only when you zoom in enough
      if (zoom > 1.18) {
        ctx.font = `${11 * zoom}px Inter, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        clusterPoints.forEach(c => {
          ctx.fillStyle = 'rgba(239,245,252,0.72)';
          ctx.fillText(c.key, c.x, c.y - 18 * zoom);
        });
      }

      // between-pole beads
      for (let i = 0; i < 8; i++) {
        const p = i / 7;
        const x = aodh.x * (1 - p) + brendan.x * p;
        const y = aodh.y * (1 - p) + brendan.y * p + Math.sin(tick * 0.012 + i) * 8;
        drawDot(x, y, 1.2 + (i % 3) * 0.35, i % 2 ? 'gold' : 'blue', 0.65);
      }

      // field particles
      fieldPoints.forEach((p, i) => {
        const shimmer = 0.45 + Math.sin(tick * 0.018 + i * 0.35) * 0.18;
        drawDot(p.x, p.y, p.size, p.tone, shimmer);
      });

      // main bodies + halos
      drawDot(aodh.x, aodh.y, 5.2 * zoom, 'blue', 1);
      drawDot(brendan.x, brendan.y, 6.2 * zoom, 'gold', 1);
      drawDot(aodh.x, aodh.y, 18 * zoom, 'blue', 0.05);
      drawDot(brendan.x, brendan.y, 24 * zoom, 'gold', 0.05);

      requestAnimationFrame(draw);
    }

    zoomIn.addEventListener('click', () => zoom = Math.min(2.1, zoom + 0.12));
    zoomOut.addEventListener('click', () => zoom = Math.max(0.8, zoom - 0.12));

    window.addEventListener('wheel', e => {
      e.preventDefault();
      zoom += e.deltaY < 0 ? 0.06 : -0.06;
      zoom = Math.max(0.8, Math.min(2.1, zoom));
    }, { passive: false });

    window.addEventListener('mousemove', e => {
      pointer.x = e.clientX / w;
      pointer.y = e.clientY / h;
    });
    window.addEventListener('touchmove', e => {
      const t = e.touches[0];
      if (!t) return;
      pointer.x = t.clientX / w;
      pointer.y = t.clientY / h;
    }, { passive: true });
    window.addEventListener('resize', resize);

    resize();
    draw();
  </script>
</body>
</html>
