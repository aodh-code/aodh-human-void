<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aodh × Brendan — V5</title>
  <style>
    :root {
      --bg0: #03050a;
      --bg1: #09121d;
      --line: rgba(160, 214, 255, 0.08);
      --blue: rgba(123, 197, 255, 0.95);
      --gold: rgba(239, 212, 145, 0.95);
      --white: rgba(239, 245, 252, 0.95);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 20%, var(--bg1) 0%, var(--bg0) 60%, #010203 100%);
      touch-action: none;
    }
    canvas { width: 100%; height: 100%; display: block; }
    .veil {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 20%, rgba(123,197,255,0.08), transparent 22%),
        radial-gradient(circle at 82% 18%, rgba(239,212,145,0.06), transparent 18%),
        radial-gradient(circle at 50% 82%, rgba(255,255,255,0.03), transparent 24%);
      mix-blend-mode: screen;
    }
    .frame {
      position: fixed;
      inset: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="veil"></div>
  <div class="frame"></div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let w, h, dpr, tick = 0;
    let zoom = 1;
    let rotation = 0;
    let dragRotation = 0;
    let pan = { x: 0, y: 0 };
    let lastTouchDistance = null;
    let lastPoint = null;

    const nodes = [];
    const clusters = [
      { key: 'memory', angle: -1.9, radius: 0.33, tone: 'blue', size: 9 },
      { key: 'github', angle: -0.95, radius: 0.36, tone: 'white', size: 8 },
      { key: 'google', angle: -0.15, radius: 0.32, tone: 'blue', size: 9 },
      { key: 'notion', angle: 0.75, radius: 0.31, tone: 'gold', size: 9 },
      { key: 'diary', angle: 1.45, radius: 0.27, tone: 'gold', size: 8 },
      { key: 'fuji', angle: 2.15, radius: 0.34, tone: 'white', size: 8 },
      { key: 'cron', angle: 2.85, radius: 0.29, tone: 'blue', size: 8 }
    ];

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      build();
    }

    function build() {
      nodes.length = 0;
      clusters.forEach((cluster, ci) => {
        for (let i = 0; i < 12; i++) {
          nodes.push({
            cluster: ci,
            orbit: i,
            angle: cluster.angle + i * 0.5,
            radius: cluster.radius,
            speed: 0.001 + (i % 5) * 0.0002,
            size: 1 + (i % 3) * 0.65,
            tone: cluster.tone,
            local: 16 + (i % 4) * 7
          });
        }
      });
    }

    function toneColor(tone, a=1) {
      if (tone === 'gold') return `rgba(239,212,145,${a})`;
      if (tone === 'white') return `rgba(239,245,252,${a})`;
      return `rgba(123,197,255,${a})`;
    }

    function drawDot(x, y, r, tone, a=1) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = toneColor(tone, a);
      ctx.fill();
    }

    function drawLine(a, b, alpha, tone='blue') {
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = toneColor(tone, alpha);
      ctx.stroke();
    }

    function rotatePoint(x, y, angle) {
      const c = Math.cos(angle);
      const s = Math.sin(angle);
      return { x: x * c - y * s, y: x * s + y * c };
    }

    function distance(a, b) {
      return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    }

    function world() {
      const cx = w / 2 + pan.x;
      const cy = h / 2 + pan.y;
      const min = Math.min(w, h);

      const aodhBase = {
        x: -min * 0.12 * zoom + Math.cos(tick * 0.006) * 6,
        y: -10 + Math.sin(tick * 0.005) * 10
      };
      const brendanBase = {
        x: min * 0.12 * zoom + Math.sin(tick * 0.007) * 9,
        y: 14 + Math.cos(tick * 0.004) * 12
      };

      const totalRotation = rotation + dragRotation;
      const aRot = rotatePoint(aodhBase.x, aodhBase.y, totalRotation);
      const bRot = rotatePoint(brendanBase.x, brendanBase.y, totalRotation);
      const aodh = { x: cx + aRot.x, y: cy + aRot.y };
      const brendan = { x: cx + bRot.x, y: cy + bRot.y };
      const midpoint = { x: (aodh.x + brendan.x) / 2, y: (aodh.y + brendan.y) / 2 };

      const clusterPoints = clusters.map((cluster, i) => {
        const wave = Math.sin(tick * 0.01 + i) * 10;
        const raw = {
          x: Math.cos(cluster.angle + tick * 0.001 * (i % 2 ? 1 : -1)) * min * cluster.radius * zoom,
          y: Math.sin(cluster.angle + tick * 0.0012 * (i % 2 ? -1 : 1)) * min * cluster.radius * 0.72 * zoom + wave
        };
        const rot = rotatePoint(raw.x, raw.y, totalRotation * 0.72);
        return {
          ...cluster,
          x: midpoint.x + rot.x,
          y: midpoint.y + rot.y
        };
      });

      const fieldPoints = nodes.map((n, i) => {
        const c = clusterPoints[n.cluster];
        const drift = tick * n.speed * (n.orbit % 2 ? 1 : -1);
        const local = {
          x: Math.cos(n.angle + drift) * (n.local * zoom + Math.sin(tick * 0.01 + i) * 4),
          y: Math.sin(n.angle - drift * 1.2) * (n.local * 0.8 * zoom + Math.cos(tick * 0.008 + i) * 4)
        };
        const rot = rotatePoint(local.x, local.y, totalRotation * 1.1);
        return { x: c.x + rot.x, y: c.y + rot.y, tone: n.tone, size: n.size };
      });

      return { aodh, brendan, midpoint, clusterPoints, fieldPoints, min, totalRotation };
    }

    function draw() {
      tick++;
      ctx.clearRect(0, 0, w, h);

      const { aodh, brendan, midpoint, clusterPoints, fieldPoints, min, totalRotation } = world();

      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        const r = min * (0.11 + i * 0.06) * zoom + Math.sin(tick * 0.01 + i) * 2;
        ctx.arc(midpoint.x, midpoint.y, r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${0.025 + i * 0.015})`;
        ctx.stroke();
      }

      drawLine(aodh, brendan, 0.28, 'gold');
      clusterPoints.forEach((c, i) => drawLine(midpoint, c, 0.07 + (i % 3) * 0.02, c.tone));

      for (let i = 0; i < fieldPoints.length; i++) {
        for (let j = i + 1; j < fieldPoints.length; j++) {
          const a = fieldPoints[i];
          const b = fieldPoints[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 42 * zoom) drawLine(a, b, (1 - dist / (42 * zoom)) * 0.06, a.tone);
        }
      }

      clusterPoints.forEach(c => drawDot(c.x, c.y, c.size * zoom, c.tone, 0.92));

      if (zoom > 1.18) {
        ctx.font = `${11 * zoom}px Inter, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        clusterPoints.forEach(c => {
          ctx.fillStyle = 'rgba(239,245,252,0.72)';
          ctx.fillText(c.key, c.x, c.y - 18 * zoom);
        });
      }

      for (let i = 0; i < 8; i++) {
        const p = i / 7;
        const x = aodh.x * (1 - p) + brendan.x * p;
        const y = aodh.y * (1 - p) + brendan.y * p + Math.sin(tick * 0.012 + i + totalRotation * 2) * 8;
        drawDot(x, y, 1.2 + (i % 3) * 0.35, i % 2 ? 'gold' : 'blue', 0.65);
      }

      fieldPoints.forEach((p, i) => drawDot(p.x, p.y, p.size, p.tone, 0.45 + Math.sin(tick * 0.018 + i * 0.35) * 0.18));
      drawDot(aodh.x, aodh.y, 5.2 * zoom, 'blue', 1);
      drawDot(brendan.x, brendan.y, 6.2 * zoom, 'gold', 1);
      drawDot(aodh.x, aodh.y, 18 * zoom, 'blue', 0.05);
      drawDot(brendan.x, brendan.y, 24 * zoom, 'gold', 0.05);

      requestAnimationFrame(draw);
    }

    window.addEventListener('wheel', e => {
      e.preventDefault();
      zoom += e.deltaY < 0 ? 0.06 : -0.06;
      zoom = Math.max(0.8, Math.min(2.2, zoom));
    }, { passive: false });

    canvas.addEventListener('pointerdown', e => {
      lastPoint = { x: e.clientX, y: e.clientY };
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', e => {
      if (!lastPoint || e.pointerType === 'touch') return;
      const dx = e.clientX - lastPoint.x;
      dragRotation += dx * 0.0035;
      lastPoint = { x: e.clientX, y: e.clientY };
    });
    canvas.addEventListener('pointerup', () => {
      rotation += dragRotation;
      dragRotation = 0;
      lastPoint = null;
    });

    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        lastPoint = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        lastTouchDistance = null;
      } else if (e.touches.length === 2) {
        lastTouchDistance = distance(e.touches[0], e.touches[1]);
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 1 && lastPoint) {
        const t = e.touches[0];
        const dx = t.clientX - lastPoint.x;
        dragRotation += dx * 0.004;
        lastPoint = { x: t.clientX, y: t.clientY };
      } else if (e.touches.length === 2) {
        const d = distance(e.touches[0], e.touches[1]);
        if (lastTouchDistance) {
          zoom *= d / lastTouchDistance;
          zoom = Math.max(0.8, Math.min(2.2, zoom));
        }
        lastTouchDistance = d;
      }
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      if (e.touches.length < 2) lastTouchDistance = null;
      if (e.touches.length === 0) {
        rotation += dragRotation;
        dragRotation = 0;
        lastPoint = null;
      }
    });

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
