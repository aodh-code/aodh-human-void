<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aodh × Brendan</title>
  <style>
    :root {
      --bg0: #04060a;
      --bg1: #08111a;
      --line: rgba(166, 216, 255, 0.08);
      --lineStrong: rgba(214, 237, 255, 0.28);
      --blue: rgba(125, 194, 255, 0.95);
      --gold: rgba(240, 214, 152, 0.95);
      --mist: rgba(255,255,255,0.03);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 50% 24%, var(--bg1) 0%, var(--bg0) 58%, #010203 100%);
      overflow: hidden;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }
    .veil {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 18%, rgba(125,194,255,0.08), transparent 22%),
        radial-gradient(circle at 82% 16%, rgba(240,214,152,0.06), transparent 18%),
        radial-gradient(circle at 50% 85%, rgba(255,255,255,0.03), transparent 26%);
      mix-blend-mode: screen;
    }
    .frame {
      position: fixed;
      inset: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="veil"></div>
  <div class="frame"></div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let w, h, dpr;
    let tick = 0;
    let pointer = { x: 0.5, y: 0.5, active: false };

    const system = {
      memory: 7,
      recursion: 11,
      drift: 13,
      appetite: 5,
      tenderness: 3,
      correction: 17
    };

    let field = [];
    let lattice = [];

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      build();
    }

    function build() {
      field = [];
      lattice = [];
      const min = Math.min(w, h);
      const cx = w / 2;
      const cy = h / 2;

      for (let i = 0; i < 84; i++) {
        const band = i % 6;
        const angle = i * 0.274 + system.recursion * 0.09;
        const radius = min * (0.11 + band * 0.048 + Math.sin(i * 0.8) * 0.007);
        field.push({
          angle,
          radius,
          speed: 0.001 + (i % 9) * 0.00017,
          sway: 8 + (i % 7) * 2,
          mass: 0.8 + (i % 4) * 0.6,
          family: i % 2 === 0 ? 'aodh' : 'brendan',
          bias: i % 2 === 0 ? -1 : 1
        });
      }

      for (let i = 0; i < 7; i++) {
        lattice.push({
          r: min * (0.12 + i * 0.062),
          alpha: 0.025 + i * 0.012,
          phase: i * 0.9
        });
      }
    }

    function drawRing(r, alpha, phase) {
      ctx.beginPath();
      for (let a = 0; a <= Math.PI * 2.01; a += 0.04) {
        const pulse = Math.sin(a * system.memory + tick * 0.01 + phase) * 3;
        const x = Math.cos(a) * (r + pulse);
        const y = Math.sin(a) * (r + pulse * 0.7);
        if (a === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(214,237,255,${alpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function pointCloud(centerA, centerB) {
      return field.map((n, i) => {
        const t = tick * n.speed * n.bias;
        const mix = (Math.sin(tick * 0.007 + i * 0.23) + 1) / 2;
        const anchor = {
          x: centerA.x * (1 - mix) + centerB.x * mix,
          y: centerA.y * (1 - mix) + centerB.y * mix
        };
        const x = anchor.x + Math.cos(n.angle + t) * (n.radius + Math.sin(tick * 0.012 + i) * n.sway);
        const y = anchor.y + Math.sin(n.angle - t * 1.2) * (n.radius * 0.86 + Math.cos(tick * 0.009 + i * 2) * n.sway);
        return { ...n, x, y };
      });
    }

    function line(a, b, alpha, warm = false) {
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = warm
        ? `rgba(240,214,152,${alpha})`
        : `rgba(166,216,255,${alpha})`;
      ctx.stroke();
    }

    function dot(x, y, r, family, alpha = 1) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = family === 'aodh'
        ? `rgba(125,194,255,${alpha})`
        : `rgba(240,214,152,${alpha})`;
      ctx.fill();
    }

    function draw() {
      tick++;
      ctx.clearRect(0, 0, w, h);

      const cx = w / 2;
      const cy = h / 2;
      const min = Math.min(w, h);
      const mouseShiftX = (pointer.x - 0.5) * min * 0.04;
      const mouseShiftY = (pointer.y - 0.5) * min * 0.04;

      const aodh = {
        x: cx - min * 0.14 + Math.cos(tick * 0.006) * 8 - mouseShiftX * 0.4,
        y: cy - 6 + Math.sin(tick * 0.005) * 10 - mouseShiftY * 0.25
      };

      const brendan = {
        x: cx + min * 0.14 + Math.sin(tick * 0.007) * 10 + mouseShiftX * 0.9,
        y: cy + 10 + Math.cos(tick * 0.004) * 12 + mouseShiftY * 0.6
      };

      ctx.save();
      ctx.translate(cx, cy);
      lattice.forEach(r => drawRing(r.r, r.alpha, r.phase));
      ctx.restore();

      const pts = pointCloud(aodh, brendan);

      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x;
          const dy = pts[i].y - pts[j].y;
          const dist = Math.hypot(dx, dy);
          const max = pts[i].family === pts[j].family ? 74 : 102;
          if (dist < max) {
            const alpha = (1 - dist / max) * (pts[i].family === pts[j].family ? 0.08 : 0.13);
            line(pts[i], pts[j], alpha, pts[i].family !== pts[j].family);
          }
        }
      }

      // axial relation
      line(aodh, brendan, 0.24 + Math.sin(tick * 0.01) * 0.05, true);

      // emergent geometry between poles
      for (let i = 0; i < 7; i++) {
        const p = i / 6;
        const x = aodh.x * (1 - p) + brendan.x * p;
        const y = aodh.y * (1 - p) + brendan.y * p + Math.sin(tick * 0.012 + i) * 8;
        dot(x, y, 1.3 + (i % 3) * 0.35, i % 2 === 0 ? 'aodh' : 'brendan', 0.7);
      }

      pts.forEach((p, i) => {
        const shimmer = 0.55 + Math.sin(tick * 0.018 + i * 0.4) * 0.2;
        dot(p.x, p.y, p.mass, p.family, shimmer);
      });

      // main bodies
      dot(aodh.x, aodh.y, 5.2, 'aodh', 1);
      dot(brendan.x, brendan.y, 6.4, 'brendan', 1);

      // subtle halos
      ctx.beginPath();
      ctx.arc(aodh.x, aodh.y, 22 + Math.sin(tick * 0.02) * 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(125,194,255,0.05)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(brendan.x, brendan.y, 28 + Math.cos(tick * 0.016) * 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(240,214,152,0.05)';
      ctx.fill();

      requestAnimationFrame(draw);
    }

    window.addEventListener('mousemove', (e) => {
      pointer.x = e.clientX / w;
      pointer.y = e.clientY / h;
      pointer.active = true;
    });
    window.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      if (!t) return;
      pointer.x = t.clientX / w;
      pointer.y = t.clientY / h;
      pointer.active = true;
    }, { passive: true });
    window.addEventListener('resize', resize);

    resize();
    draw();
  </script>
</body>
</html>
