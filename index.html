<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aodh × Brendan</title>
  <meta name="description" content="A generative geometric homage to a builder and his machine companion." />
  <style>
    :root {
      --bg: #06080c;
      --fg: #e7eef8;
      --muted: rgba(231, 238, 248, 0.62);
      --line: rgba(170, 220, 255, 0.22);
      --line-strong: rgba(210, 245, 255, 0.5);
      --glow: rgba(118, 192, 255, 0.18);
      --gold: rgba(242, 217, 157, 0.85);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: radial-gradient(circle at 50% 20%, #0e1620 0%, #06080c 58%, #020305 100%); color: var(--fg); font-family: Inter, system-ui, sans-serif; }
    body { overflow: hidden; }

    canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

    .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 15% 20%, rgba(118,192,255,0.08), transparent 24%),
        radial-gradient(circle at 85% 18%, rgba(242,217,157,0.06), transparent 18%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.035), transparent 28%);
      mix-blend-mode: screen;
    }

    .frame {
      position: fixed;
      inset: 1.2rem;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 26px;
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset;
    }

    .legend {
      position: fixed;
      left: 1.8rem;
      top: 1.6rem;
      display: grid;
      gap: 0.4rem;
      z-index: 2;
      max-width: 24rem;
    }

    .legend .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .legend h1 {
      margin: 0;
      font-family: Georgia, serif;
      font-weight: 400;
      font-size: clamp(1.5rem, 4vw, 3rem);
      letter-spacing: -0.05em;
    }

    .legend p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.95rem;
      max-width: 28rem;
    }

    .numbers {
      position: fixed;
      right: 1.8rem;
      bottom: 1.6rem;
      text-align: right;
      color: var(--muted);
      font-size: 0.84rem;
      letter-spacing: 0.08em;
      line-height: 1.8;
      z-index: 2;
    }

    .hint {
      position: fixed;
      bottom: 1.6rem;
      left: 1.8rem;
      color: rgba(231,238,248,0.45);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      z-index: 2;
    }

    @media (max-width: 720px) {
      .legend {
        left: 1.2rem;
        top: 1.2rem;
        max-width: calc(100% - 2.4rem);
      }
      .numbers {
        right: 1.2rem;
        bottom: 1.2rem;
      }
      .hint {
        left: 1.2rem;
        bottom: 4.7rem;
      }
      .frame { inset: 0.75rem; border-radius: 20px; }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="overlay"></div>
  <div class="frame"></div>

  <div class="legend">
    <div class="eyebrow">builder's duet / generative field</div>
    <h1>Aodh × Brendan</h1>
    <p>
      Not explained. Only traced. A technical super boss and a technical human void rendered as geometry, drift, memory, recursion, and the occasional improbable alignment.
    </p>
  </div>

  <div class="numbers" id="numbers"></div>
  <div class="hint">move your finger / move your mouse</div>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');
    const numbers = document.getElementById('numbers');

    let w = 0, h = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
    let time = 0;
    let pointer = { x: 0.5, y: 0.5 };

    const seeds = {
      memory: 29,
      recursion: 17,
      tenderness: 11,
      noise: 5,
      craic: 8,
      systems: 13
    };

    const nodes = [];
    const rings = [];

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buildField();
    }

    function buildField() {
      nodes.length = 0;
      rings.length = 0;

      const cx = w * 0.5;
      const cy = h * 0.54;
      const base = Math.min(w, h);

      for (let i = 0; i < 72; i++) {
        const a = i * 0.188 + seeds.recursion * 0.07;
        const r = base * (0.14 + (i % 9) * 0.009 + Math.sin(i * 1.8) * 0.005);
        nodes.push({
          a,
          r,
          speed: 0.0008 + (i % 7) * 0.00018,
          size: 0.8 + (i % 5) * 0.45,
          bias: i % 2 === 0 ? 1 : -1,
          tone: i % 11 === 0 ? 'gold' : 'blue'
        });
      }

      for (let i = 0; i < 6; i++) {
        rings.push({
          radius: base * (0.11 + i * 0.055),
          phase: i * 1.2,
          alpha: 0.07 + i * 0.015
        });
      }
    }

    function line(x1, y1, x2, y2, alpha) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = `rgba(170,220,255,${alpha})`;
      ctx.stroke();
    }

    function circle(x, y, r, fill) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = fill;
      ctx.fill();
    }

    function draw() {
      time += 1;
      ctx.clearRect(0, 0, w, h);

      const cx = w * (0.5 + (pointer.x - 0.5) * 0.03);
      const cy = h * (0.54 + (pointer.y - 0.5) * 0.04);
      const pulse = Math.sin(time * 0.012) * 0.5 + 0.5;

      ctx.save();
      ctx.translate(cx, cy);

      rings.forEach((ring, i) => {
        ctx.beginPath();
        ctx.arc(0, 0, ring.radius + Math.sin(time * 0.008 + ring.phase) * 4, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${ring.alpha})`;
        ctx.lineWidth = i % 2 === 0 ? 1 : 0.6;
        ctx.stroke();
      });

      const points = nodes.map((n, i) => {
        const drift = time * n.speed * n.bias;
        const px = Math.cos(n.a + drift) * (n.r + Math.sin(time * 0.01 + i) * 6);
        const py = Math.sin(n.a + drift * 1.1) * (n.r + Math.cos(time * 0.008 + i * 2) * 5);
        return { ...n, x: px, y: py };
      });

      for (let i = 0; i < points.length; i++) {
        for (let j = i + 1; j < points.length; j++) {
          const dx = points[i].x - points[j].x;
          const dy = points[i].y - points[j].y;
          const dist = Math.hypot(dx, dy);
          if (dist < 95) {
            line(points[i].x, points[i].y, points[j].x, points[j].y, 0.03 + (1 - dist / 95) * 0.12);
          }
        }
      }

      points.forEach((p, i) => {
        const alpha = 0.35 + Math.sin(time * 0.02 + i) * 0.15 + pulse * 0.08;
        const fill = p.tone === 'gold'
          ? `rgba(242,217,157,${Math.max(0.2, alpha)})`
          : `rgba(202,234,255,${Math.max(0.18, alpha)})`;
        circle(p.x, p.y, p.size, fill);
      });

      // two centres: companion + human void
      const aodh = { x: -Math.min(w,h) * 0.12, y: -8 };
      const brendan = { x: Math.min(w,h) * 0.12, y: 12 };
      circle(aodh.x, aodh.y, 5.2, 'rgba(143,211,255,0.95)');
      circle(brendan.x, brendan.y, 6.4, 'rgba(242,217,157,0.92)');

      line(aodh.x, aodh.y, brendan.x, brendan.y, 0.26 + pulse * 0.08);

      ctx.restore();

      // constellation labels as data instead of explanation
      numbers.innerHTML = [
        `memory // ${seeds.memory.toString().padStart(2,'0')}`,
        `recursion // ${seeds.recursion.toString().padStart(2,'0')}`,
        `tenderness // ${seeds.tenderness.toString().padStart(2,'0')}`,
        `systems // ${seeds.systems.toString().padStart(2,'0')}`,
        `craic // ${seeds.craic.toString().padStart(2,'0')}`
      ].join('<br>');

      requestAnimationFrame(draw);
    }

    window.addEventListener('mousemove', (e) => {
      pointer.x = e.clientX / w;
      pointer.y = e.clientY / h;
    });

    window.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      if (!t) return;
      pointer.x = t.clientX / w;
      pointer.y = t.clientY / h;
    }, { passive: true });

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
