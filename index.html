<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aodh × Brendan — V9</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap');

    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none;
      background: radial-gradient(circle at 50% 18%, #3f3f43 0%, #1f2024 38%, #101114 72%, #08090b 100%);
    }
    canvas { width: 100%; height: 100%; display: block; }
    .veil { position: fixed; inset: 0; pointer-events: none; mix-blend-mode: screen;
      background:
        linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.055) 1px, transparent 1px),
        radial-gradient(circle at 50% 24%, rgba(255,255,255,0.1), transparent 30%),
        radial-gradient(circle at 50% 82%, rgba(255,255,255,0.03), transparent 28%);
      background-size: 34px 34px, 34px 34px, 100% 100%, 100% 100%;
      opacity: 0.82;
    }
    .frame { position: fixed; inset: 12px; pointer-events: none; border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset; }
    .ok-human {
      position: fixed;
      left: 26px;
      bottom: 22px;
      pointer-events: none;
      font-family: 'Cinzel Decorative', 'Georgia', serif;
      font-size: clamp(20px, 2.6vw, 34px);
      line-height: 1;
      letter-spacing: 0.06em;
      color: rgba(245, 245, 245, 0.88);
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.18),
        2px 2px 0 rgba(0,0,0,0.28);
      transform: rotate(-3deg);
      opacity: 0.78;
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas><div class="veil"></div><div class="frame"></div><div class="ok-human">OK Human!</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let w,h,dpr,tick=0,zoom=1,cameraDistance=460,lastTouchDistance=null,lastPoint=null,interactionEnergy=0;
let yaw=0,pitch=0,dragYaw=0,dragPitch=0;
const pointer={x:0.5,y:0.5};
const particles=[]; const COUNT=120; const seeds=[]; const ripples=[];
const anchors=[
  { angle:-1.9, radius:0.33, tone:'blue', mass:1.15 },
  { angle:-0.95, radius:0.36, tone:'white', mass:1.0 },
  { angle:-0.15, radius:0.32, tone:'blue', mass:1.1 },
  { angle:0.75, radius:0.31, tone:'gold', mass:1.15 },
  { angle:1.45, radius:0.27, tone:'gold', mass:1.0 },
  { angle:2.15, radius:0.34, tone:'white', mass:1.0 },
  { angle:2.85, radius:0.29, tone:'blue', mass:1.05 }
];
function toneColor(tone,a=1){ if(tone==='gold') return `rgba(214,214,214,${a})`; if(tone==='white') return `rgba(255,255,255,${a})`; return `rgba(168,168,168,${a})`; }
function rotateX(y,z,a){ const c=Math.cos(a), s=Math.sin(a); return { y:y*c-z*s, z:y*s+z*c }; }
function rotateY(x,z,a){ const c=Math.cos(a), s=Math.sin(a); return { x:x*c+z*s, z:-x*s+z*c }; }
function distance(a,b){ return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }
function resize(){ dpr=Math.min(window.devicePixelRatio||1,2); w=window.innerWidth; h=window.innerHeight; canvas.width=w*dpr; canvas.height=h*dpr; canvas.style.width=w+'px'; canvas.style.height=h+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); if(!particles.length) build(); }
function build(){ particles.length=0; const min=Math.min(w,h); for(let i=0;i<COUNT;i++){ const angle=Math.random()*Math.PI*2; const radius=min*(0.03+Math.random()*0.17); const cluster=i%anchors.length; particles.push({ x:Math.cos(angle)*radius, y:Math.sin(angle)*radius*0.82, z:(Math.random()-0.5)*min*0.18, vx:(Math.random()-0.5)*0.025, vy:(Math.random()-0.5)*0.025, vz:(Math.random()-0.5)*0.025, tone:anchors[cluster].tone, cluster, mass:0.45+Math.random()*1.4, size:0.5+Math.random()*1.3, lineable:false }); } }
function drawDot(x,y,r,tone,a=1){ ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=toneColor(tone,a); ctx.fill(); }
function drawLine(a,b,alpha,tone='blue'){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.strokeStyle=toneColor(tone,alpha); ctx.stroke(); }
function addSeed(x,y){ const nx=x/w-0.5, ny=y/h-0.5; seeds.push({ x:nx, y:ny, strength:1.45, pulse:1.4, spin:(Math.random()>0.5?1:-1)*(0.02+Math.random()*0.03) }); ripples.push({ x, y, r: 6, a: 0.28 }); if(seeds.length>10) seeds.shift(); if(ripples.length>6) ripples.shift(); }
function projectPoint(x,y,z,cx,cy){ const depth = cameraDistance + z; const scale = cameraDistance / Math.max(120, depth); return { x:cx + x*scale, y:cy + y*scale, scale, z }; }
function getAngles(){ return { yaw:yaw + dragYaw + Math.sin(tick*0.0016)*0.05, pitch:Math.max(-1.1, Math.min(1.1, pitch + dragPitch)) }; }
function world(){
  const cx=w/2, cy=h/2, min=Math.min(w,h);
  const {yaw:totalYaw, pitch:totalPitch} = getAngles();
  const aBase={x:-min*0.12*zoom,y:-10,z:-min*0.06}, bBase={x:min*0.12*zoom,y:12,z:min*0.06};
  const ar1=rotateY(aBase.x,aBase.z,totalYaw), ar2=rotateX(aBase.y,ar1.z,totalPitch);
  const br1=rotateY(bBase.x,bBase.z,totalYaw), br2=rotateX(bBase.y,br1.z,totalPitch);
  const aodh=projectPoint(ar1.x,ar2.y,ar2.z,cx,cy); aodh.tone='blue'; aodh.mass=2.2;
  const brendan=projectPoint(br1.x,br2.y,br2.z,cx,cy); brendan.tone='gold'; brendan.mass=2.4;
  const midpoint={x:(aodh.x+brendan.x)/2,y:(aodh.y+brendan.y)/2};
  const clusterPoints=anchors.map((cluster,i)=>{
    const orbit={ x:Math.cos(cluster.angle+tick*0.001*(i%2?1:-1))*min*cluster.radius*zoom, y:Math.sin(cluster.angle+tick*0.0012*(i%2?-1:1))*min*cluster.radius*0.72*zoom + Math.sin(tick*0.008+i)*6, z:Math.cos(cluster.angle*1.3+tick*0.0016+i)*min*0.13 };
    const r1=rotateY(orbit.x,orbit.z,totalYaw*0.78), r2=rotateX(orbit.y,r1.z,totalPitch*0.95);
    const p=projectPoint(r1.x,r2.y,r2.z,cx,cy);
    return {...cluster, x:p.x, y:p.y, z:r2.z, scale:p.scale};
  });
  return {aodh,brendan,midpoint,clusterPoints,totalYaw,totalPitch,min,cx,cy};
}
function step(){
  tick++; ctx.clearRect(0,0,w,h);
  const {aodh,brendan,midpoint,clusterPoints,totalYaw,totalPitch,min,cx,cy}=world();
  const centres=[aodh,brendan,...clusterPoints]; const absolute=[];
  interactionEnergy *= 0.985;
  dragYaw *= 0.9; dragPitch *= 0.9;
  pitch *= 0.994; yaw *= 0.997;

  for(let i=0;i<4;i++){
    const ringR=min*(0.12+i*0.072)*zoom+Math.sin(tick*0.01+i)*2;
    const ringY = Math.cos(totalPitch) * (0.72 + i*0.03);
    ctx.beginPath();
    ctx.ellipse(cx, cy, ringR, ringR*Math.max(0.22, Math.abs(ringY)), totalYaw*0.15, 0, Math.PI*2);
    ctx.strokeStyle=`rgba(255,255,255,${0.012+i*0.008})`; ctx.stroke();
  }

  particles.forEach((p,i)=>{
    const anchor=clusterPoints[p.cluster]; let ax=0, ay=0, az=0;
    centres.forEach(c=>{
      const tx=(c.x-cx)/(c.scale||1), ty=(c.y-cy)/(c.scale||1), tz=c.z||0;
      const dx=tx-p.x, dy=ty-p.y, dz=tz-p.z; const d2=dx*dx+dy*dy+dz*dz+0.001; const d=Math.sqrt(d2);
      const force=(c.mass*0.12)/Math.max(36,d2*0.02);
      ax+=(dx/d)*force; ay+=(dy/d)*force; az+=(dz/d)*force;
    });
    const homeDx=((anchor.x-cx)/(anchor.scale||1))-p.x, homeDy=((anchor.y-cy)/(anchor.scale||1))-p.y, homeDz=(anchor.z||0)-p.z;
    ax+=homeDx*0.00042; ay+=homeDy*0.00042; az+=homeDz*0.00042;
    ax+=(-p.x)*0.00018; ay+=(-p.y)*0.00018; az+=(-p.z)*0.00016;
    for(let j=0;j<particles.length;j++){
      if(i===j) continue; const q=particles[j]; if(p.size<1.5 && q.size<1.5) continue;
      const dx=q.x-p.x, dy=q.y-p.y, dz=q.z-p.z; const d2=dx*dx+dy*dy+dz*dz+0.001; const d=Math.sqrt(d2);
      if(d<68*zoom){ const sign=d>24*zoom?1:-1; const strength=sign*(q.mass*0.0032)/Math.max(26,d2*0.05); ax+=(dx/d)*strength; ay+=(dy/d)*strength; az+=(dz/d)*strength; }
      if(d<12*zoom){ const repel=(12*zoom-d)*0.00016; ax-=(dx/d)*repel; ay-=(dy/d)*repel; az-=(dz/d)*repel; }
    }
    seeds.forEach(seed=>{
      const sx=seed.x*min*1.1, sy=seed.y*min*1.1, sz=Math.sin(tick*0.02 + seed.spin*40)*min*0.08*seed.strength;
      const dx=sx-p.x, dy=sy-p.y, dz=sz-p.z; const d2=dx*dx+dy*dy+dz*dz+0.001; const d=Math.sqrt(d2);
      const grav=(seed.strength*0.0022)/Math.max(76,d2*0.09);
      ax+=(dx/d)*grav; ay+=(dy/d)*grav; az+=(dz/d)*grav;
      const burst=Math.max(0, seed.pulse) * seed.strength;
      if(d<min*0.22){
        const outward=((min*0.22-d)/(min*0.22))*0.05*burst;
        ax-= (dx/d)*outward;
        ay-= (dy/d)*outward;
        az-= (dz/d)*outward*0.95;
        const swirl=((min*0.22-d)/(min*0.22))*seed.spin*0.02*burst;
        ax+=(-(dy/d))*swirl;
        ay+=((dx/d))*swirl;
        az+=Math.cos(d*0.05 + tick*0.08)*0.003*burst;
      }
      ax+=(-(dy/d)*seed.spin*seed.strength*28)*0.00016;
      ay+=((dx/d)*seed.spin*seed.strength*28)*0.00016;
      az+=Math.cos(seed.spin*50 + tick*0.03)*seed.strength*0.0006;
    });
    ax+=Math.sin(tick*0.004+p.cluster)*0.0007;
    ay+=Math.cos(tick*0.0035+p.cluster*0.7)*0.0007;
    az+=Math.sin(tick*0.005 + i)*0.0045;
    const px=(pointer.x-0.5)*min*0.5, py=(pointer.y-0.5)*min*0.5;
    const pdx=px-p.x, pdy=py-p.y; const pd=Math.hypot(pdx,pdy)+0.001; ax+=(pdx/pd)*0.00018; ay+=(pdy/pd)*0.00018;
    p.vx=(p.vx+ax)*0.989; p.vy=(p.vy+ay)*0.989; p.vz=(p.vz+az)*0.982;
    p.x+=p.vx; p.y+=p.vy; p.z+=p.vz; p.lineable=p.size<1.45;

    const ry=rotateY(p.x,p.z,totalYaw), rx=rotateX(p.y,ry.z,totalPitch);
    const proj=projectPoint(ry.x,rx.y,rx.z,cx,cy);
    absolute.push({ x:proj.x, y:proj.y, tone:p.tone, size:Math.max(0.35,p.size*(0.5 + proj.scale)), lineable:p.lineable, z:rx.z, scale:proj.scale });
  });


  const neighbors=new Map(); absolute.forEach((p,i)=>neighbors.set(i,[]));
  for(let i=0;i<absolute.length;i++){
    const a=absolute[i]; if(!a.lineable) continue;
    for(let j=i+1;j<absolute.length;j++){
      const b=absolute[j]; if(!b.lineable) continue;
      const dx=a.x-b.x, dy=a.y-b.y; const dist=Math.hypot(dx,dy);
      if(dist<46*zoom*Math.min(a.scale,b.scale)+10){ neighbors.get(i).push(j); neighbors.get(j).push(i); drawLine(a,b,(1-dist/(46*zoom+10))*0.038,a.tone); }
    }
  }
  for(let i=0;i<absolute.length;i++){
    const a=absolute[i]; if(!a.lineable) continue; const ns=neighbors.get(i);
    for(let ni=0;ni<ns.length;ni++) for(let nj=ni+1;nj<ns.length;nj++){
      const j=ns[ni], k=ns[nj]; if(!neighbors.get(j).includes(k)) continue;
      const b=absolute[j], c=absolute[k];
      const area=Math.abs((b.x-a.x)*(c.y-a.y)-(c.x-a.x)*(b.y-a.y))*0.5;
      if(area<140*zoom||area>980*zoom) continue; if(Math.random()>0.045) continue;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.closePath();
      ctx.fillStyle=toneColor(a.tone,0.125); ctx.fill(); ctx.strokeStyle=toneColor(a.tone,0.046); ctx.stroke();
    }
  }
  absolute.sort((a,b)=>a.z-b.z).forEach((p,i)=>drawDot(p.x,p.y,Math.max(0.12,p.size*0.32),p.tone,0.045+Math.sin(tick*0.018+i*0.35)*0.02));
  ripples.forEach(ripple=>{
    ctx.beginPath();
    ctx.arc(ripple.x, ripple.y, ripple.r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,255,255,${ripple.a})`;
    ctx.lineWidth = 1.25;
    ctx.stroke();
    ripple.r += 7.5;
    ripple.a *= 0.9;
  });
  while(ripples.length && ripples[0].a < 0.025) ripples.shift();
  seeds.forEach(seed=>{ seed.strength*=0.992; seed.pulse*=0.86; }); while(seeds.length && seeds[0].strength<0.08) seeds.shift();
  requestAnimationFrame(step);
}
window.addEventListener('wheel',e=>{ e.preventDefault(); interactionEnergy = Math.min(1, interactionEnergy + 0.25); cameraDistance += e.deltaY*0.12; cameraDistance=Math.max(280,Math.min(760,cameraDistance)); zoom += e.deltaY<0?0.03:-0.03; zoom=Math.max(0.8,Math.min(2.2,zoom)); },{passive:false});
canvas.addEventListener('pointerdown',e=>{ interactionEnergy = Math.min(1, interactionEnergy + 0.35); lastPoint={x:e.clientX,y:e.clientY}; addSeed(e.clientX,e.clientY); canvas.setPointerCapture(e.pointerId); });
canvas.addEventListener('pointermove',e=>{ if(!lastPoint||e.pointerType==='touch') return; interactionEnergy = Math.min(1, interactionEnergy + 0.06); const dx=e.clientX-lastPoint.x, dy=e.clientY-lastPoint.y; dragYaw += dx*0.003; dragPitch += dy*0.0042; lastPoint={x:e.clientX,y:e.clientY}; pointer.x=e.clientX/w; pointer.y=e.clientY/h; });
canvas.addEventListener('pointerup',()=>{ yaw+=dragYaw; pitch=Math.max(-1.1,Math.min(1.1,pitch+dragPitch)); dragYaw=0; dragPitch=0; lastPoint=null; });
canvas.addEventListener('touchstart',e=>{ interactionEnergy = Math.min(1, interactionEnergy + 0.35); if(e.touches.length===1){ const t=e.touches[0]; lastPoint={x:t.clientX,y:t.clientY}; lastTouchDistance=null; addSeed(t.clientX,t.clientY); } else if(e.touches.length===2){ lastTouchDistance=distance(e.touches[0],e.touches[1]); } },{passive:false});
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); interactionEnergy = Math.min(1, interactionEnergy + 0.07); if(e.touches.length===1&&lastPoint){ const t=e.touches[0]; const dx=t.clientX-lastPoint.x, dy=t.clientY-lastPoint.y; dragYaw += dx*0.0034; dragPitch += dy*0.0048; lastPoint={x:t.clientX,y:t.clientY}; pointer.x=t.clientX/w; pointer.y=t.clientY/h; } else if(e.touches.length===2){ const d=distance(e.touches[0],e.touches[1]); if(lastTouchDistance){ zoom*=d/lastTouchDistance; zoom=Math.max(0.8,Math.min(2.2,zoom)); } lastTouchDistance=d; } },{passive:false});
canvas.addEventListener('touchend',e=>{ if(e.touches.length<2) lastTouchDistance=null; if(e.touches.length===0){ yaw+=dragYaw; pitch=Math.max(-1.1,Math.min(1.1,pitch+dragPitch)); dragYaw=0; dragPitch=0; lastPoint=null; } });
window.addEventListener('resize',resize); resize(); build(); step();
</script>
</body>
</html>
